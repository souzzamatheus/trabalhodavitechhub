<article class="product-card">
  <a class="product-image-link" [routerLink]="['/produto', product.id]" [attr.aria-label]="'Ver detalhes: ' + product.title">
    <div class="product-image">
      <img [src]="product.image" [alt]="product.title" loading="lazy" />
    </div>
  </a>

  <div class="card-content">
    <div class="category-badge">{{ product.category | titlecase }}</div>
    
    <h2 class="product-title">{{ product.title }}</h2>
    
    <div class="rating-section">
      <span class="stars">⭐ {{ product.rating.rate }}</span>
      <span class="review-count">({{ product.rating.count }})</span>
    </div>
    
    <div class="price-section">
      <span class="price">R$ {{ product.price | number:'1.2-2' }}</span>
    </div>
    
    <a class="view-btn" [routerLink]="['/produto', product.id]">
      Ver Detalhes →
    </a>
  </div>
</article>
